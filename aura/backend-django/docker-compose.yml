services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=aura
      - POSTGRES_USER=aura_user
      - POSTGRES_PASSWORD=aura_password

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://aura_user:aura_password@db:5432/aura
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev_secret_key
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A aura_backend worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://aura_user:aura_password@db:5432/aura
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
